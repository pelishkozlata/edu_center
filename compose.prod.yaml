services:
  web:
    build: .
    command: sh -c "python manage.py migrate && gunicorn edu_center.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 30"

    env_file:
      - .env.prod

    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17

    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      retries: 5

  nginx:
    image: nginx:1.27

    ports:
      - "80:80"

    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - web

volumes:
  pgdata: