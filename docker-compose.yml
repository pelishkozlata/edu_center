services:
  backend:
    build: .
    container_name: edu_backend

    command: sh -c "python manage.py migrate && gunicorn edu_center.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 30"

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: edu_postgres

    environment:
      POSTGRES_DB: edu_center
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: