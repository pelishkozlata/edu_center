<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Branches</title>
</head>
<body>
    <h1>Branches</h1>

    {% if branches %}
        <ul>
            {% for branch in branches %}
                <li>
                    {{ branch.name }} — {{ branch.city }} — {{ branch.status }}
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No branches yet.</p>
    {% endif %}
</body>
</html>
